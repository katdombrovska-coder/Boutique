:root {
    --bg: #fff7eb;
    --ink: #240029;
    --ink-2: #3a1240;
    --muted: #6b4f6f;
    --line: #e9d9d4;
    --accent: #ec1c8c;
    --accent-hov: #c8146f;
    --card: #ffffff;
}

html,
body {
    margin: 0;
    padding: 0;
    background-color: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background-image:
        radial-gradient(1100px 600px at 8% -10%, #ffd6e7, rgba(0, 0, 0, 0) 55%),
        radial-gradient(1200px 700px at 110% -5%, #fff1b0, rgba(0, 0, 0, 0) 60%),
        radial-gradient(900px 600px at 50% 0px, #fcd9bd, rgba(0, 0, 0, 0) 70%),
        radial-gradient(900px 700px at 100% 100%, #ffd6e7, rgba(0, 0, 0, 0) 60%);
    background-attachment: fixed;
}

::selection {
    background-color: var(--accent);
    color: #fff;
}

/* === Display utilities === */
.font-display {
    font-family: 'Bricolage Grotesque', serif;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 0.95;
}

.font-sans-clean {
    font-family: 'Inter', sans-serif;
}

/* === Card styles === */
.card-soft {
    background: #ffffff;
    border-radius: 28px;
    box-shadow:
        0 1px 0 rgba(36, 0, 41, 0.04),
        0 20px 50px -30px rgba(36, 0, 41, 0.18);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
}

.card-soft:hover {
    transform: translateY(-3px);
    box-shadow:
        0 1px 0 rgba(36, 0, 41, 0.04),
        0 30px 60px -25px rgba(236, 28, 140, 0.25);
}

.card-dark {
    background: linear-gradient(160deg, #1a0a2e 0%, #2d0a2e 25%, #4a1040 60%, #6b1050 100%);
    border-radius: 28px;
    color: #ffffff;
    box-shadow:
        0 14px 30px -10px rgba(236, 28, 140, 0.45),
        0 0 0 1px rgba(236, 28, 140, 0.05) inset;
}

.card-pink {
    background: #ffffff;
    border-radius: 28px;
    color: #240029;
    border: 1.5px solid #ec1c8c;
    box-shadow:
        0 18px 40px -22px rgba(236, 28, 140, 0.35),
        0 0 0 4px rgba(236, 28, 140, 0.05);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
}

.card-pink:hover {
    transform: translateY(-3px);
    box-shadow:
        0 28px 60px -22px rgba(236, 28, 140, 0.45),
        0 0 0 6px rgba(236, 28, 140, 0.07);
}

/* === Pill chip === */
.chip-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #fff;
    border: 1px solid rgba(36, 0, 41, 0.08);
    border-radius: 9999px;
    padding: 6px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    box-shadow: 0 1px 0 rgba(36, 0, 41, 0.03);
}

/* === Scribble (handwritten accent) === */
.scribble {
    font-family: 'Bricolage Grotesque', serif;
    font-style: italic;
    color: var(--accent);
    font-weight: 600;
    transform: rotate(-2deg);
    display: inline-block;
}

/* Smooth entrance */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
}

.fade-up {
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@media print {
    html, body {
        background: #ffffff !important;
        background-image: none !important;
    }
    * {
        print-color-adjust: exact !important;
    }
    .no-print { display: none !important; }
    .card-soft, .card-pink {
        box-shadow: none !important;
        page-break-inside: avoid;
        break-inside: avoid;
    }
    .card-pink {
        border: 1.5px solid #ec1c8c !important;
    }
    @page {
        size: A4;
        margin: 14mm 10mm;
    }
}
