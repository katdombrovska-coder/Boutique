<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 640" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff9f4"/>
      <stop offset="100%" stop-color="#f8efe6"/>
    </linearGradient>
    <linearGradient id="fabric" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5ebe3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ead9cf" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="tape" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec1c8c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d94a8f" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#240029" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="520" height="640" rx="36" fill="url(#bgGlow)"/>
  <rect x="24" y="24" width="472" height="592" rx="28" fill="#fff" fill-opacity="0.55" stroke="#f0e4dc" stroke-width="1"/>
  <!-- subtle stitch texture -->
  <g stroke="#3a1240" stroke-opacity="0.06" stroke-width="1" stroke-dasharray="3 7">
    <path d="M48 88h424M48 552h424M88 48v544M432 48v544"/>
  </g>
  <!-- fabric drape -->
  <path d="M96 420c40-80 120-120 164-92 44 28 72 108 48 168-24 60-88 96-140 76-52-20-112-92-72-152z" fill="url(#fabric)" opacity="0.85"/>
  <path d="M300 380c30 40 80 52 110 24" stroke="#d9c4b8" stroke-width="1.2" stroke-opacity="0.6"/>
  <!-- measurement lines -->
  <g stroke="#ec1c8c" stroke-opacity="0.22" stroke-width="1" stroke-dasharray="4 6">
    <line x1="120" y1="140" x2="120" y2="380"/>
    <line x1="120" y1="140" x2="200" y2="120"/>
    <line x1="120" y1="220" x2="250" y2="210"/>
    <line x1="120" y1="300" x2="235" y2="295"/>
    <line x1="120" y1="380" x2="210" y2="390"/>
  </g>
  <g fill="#ec1c8c" fill-opacity="0.35">
    <circle cx="120" cy="140" r="3"/><circle cx="200" cy="120" r="2.5"/>
    <circle cx="250" cy="210" r="2.5"/><circle cx="235" cy="295" r="2.5"/><circle cx="210" cy="390" r="2.5"/>
  </g>
  <!-- mannequin silhouette -->
  <g filter="url(#softShadow)" fill="#240029" fill-opacity="0.88">
    <ellipse cx="260" cy="118" rx="34" ry="40"/>
    <path d="M226 158c-8 28-6 58 4 88 10 30 8 58-2 86-6 18-4 38 8 52 12 14 30 14 48 0 62-12 14-14 34-8 52-10-18-8-38 2-86 10-30 12-60 4-88-34-40z"/>
    <path d="M214 178c-28 8-48 30-56 58-6 20-2 42 10 58" fill="none" stroke="#240029" stroke-width="14" stroke-linecap="round" stroke-opacity="0.12"/>
    <path d="M306 178c28 8 48 30 56 58 6 20 2 42-10 58" fill="none" stroke="#240029" stroke-width="14" stroke-linecap="round" stroke-opacity="0.12"/>
  </g>
  <!-- measuring tape -->
  <path d="M148 500c80-30 160-18 230 24 42 26 78 18 104-8" stroke="url(#tape)" stroke-width="10" stroke-linecap="round"/>
  <path d="M148 500c80-30 160-18 230 24" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-opacity="0.35" stroke-dasharray="2 5"/>
  <g fill="#ec1c8c" fill-opacity="0.7" font-family="Inter, sans-serif" font-size="9" font-weight="600">
    <text x="168" y="494">62</text><text x="228" y="478">84</text><text x="288" y="468">96</text>
  </g>
  <!-- needle & thread detail -->
  <g stroke="#3a1240" stroke-opacity="0.18" stroke-width="1.2" stroke-linecap="round">
    <path d="M360 160l28-18"/><path d="M388 142l6 10"/>
  </g>
  <circle cx="394" cy="152" r="2" fill="#ec1c8c" fill-opacity="0.5"/>
  <!-- pattern curve -->
  <path d="M340 520c-40 24-96 30-140 8-28-14-40-42-24-66 16-24 52-34 84-22" stroke="#3a1240" stroke-opacity="0.08" stroke-width="1.5" fill="none"/>
  <path d="M360 200c20-40 56-62 92-48" stroke="#ec1c8c" stroke-opacity="0.15" stroke-width="1" fill="none" stroke-dasharray="2 5"/>
</svg>
